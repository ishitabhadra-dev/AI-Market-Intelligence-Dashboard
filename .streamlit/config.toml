[theme]
primaryColor = "#4f8cff"
backgroundColor = "#0a0e17"
secondaryBackgroundColor = "#121a2b"
textColor = "#e8eef7"
font = "sans serif"

[server]
headless = true
port = 8501
address = "0.0.0.0"
enableCORS = false
enableXsrfProtection = true
maxUploadSize = 5

[browser]
gatherUsageStats = false

[client]
toolbarMode = "minimal"
